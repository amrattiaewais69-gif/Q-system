<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Queue System - Professional Display</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #003366; --gold: #d4af37; --bg: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; color: white; }
        
        .main-wrapper { display: flex; height: calc(100% - 65px); padding: 15px; box-sizing: border-box; gap: 15px; }
        
        #videoSection { flex: 1.4; border-radius: 20px; overflow: hidden; background: #000; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        video { width: 100%; height: 100%; object-fit: cover; }

        #numberSection { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .current-call { 
            flex: 2; background: rgba(255,255,255,0.05); border-radius: 20px; border: 2px solid var(--gold); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; 
        }

        .uni-logo { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 150px; z-index: 5; }

        #numDisplay { font-size: 180px; font-weight: 900; line-height: 1; }
        #winDisplay { font-size: 40px; color: var(--gold); font-weight: bold; margin-top: 10px; }

        #historyBox { flex: 0.8; background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; overflow: hidden; }
        .history-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 18px; }

        .ticker-container { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--primary); display: flex; align-items: center; border-top: 4px solid var(--gold); z-index: 100; }
        .ticker-title { background: var(--gold); color: #000; padding: 0 20px; height: 100%; display: flex; align-items: center; font-weight: 800; }
        .ticker-wrap { flex: 1; overflow: hidden; }
        .ticker-content { display: inline-block; white-space: nowrap; padding-left: 100%; font-size: 24px; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* لوحة التحكم */
        .admin-sidebar {
            position: fixed; 
            right: 15px; 
            top: 15px; 
            width: 260px;
            background: rgba(15, 23, 42, 0.98); 
            padding: 15px; 
            border-radius: 12px;
            border: 2px solid var(--gold); 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            z-index: 9999;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            opacity: 0; 
            transform: translateX(120%); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; /* مغلق افتراضياً */
        }

        /* يظهر فقط عند الـ Hover على جسم الصفحة بشرط عدم وجود كلاس الحظر */
        body:hover .admin-sidebar:not(.blocked), .admin-sidebar:hover:not(.blocked) { 
            opacity: 1; 
            pointer-events: auto;
            transform: translateX(0); 
        }

        /* الكلاس الذي سيمنع الظهور تماماً */
        .blocked {
            opacity: 0 !important;
            transform: translateX(120%) !important;
            pointer-events: none !important;
        }

        .control-group { border-bottom: 1px solid #334155; padding-bottom: 8px; }
        label { font-size: 10px; color: var(--gold); display: block; margin-bottom: 5px; font-weight: bold; }
        .btn-row { display: flex; gap: 4px; flex-wrap: wrap; }
        button { flex: 1; padding: 6px; font-size: 10px; cursor: pointer; background: #334155; color: white; border: 1px solid #475569; border-radius: 4px; }
        button:hover { background: var(--gold); color: black; }
        input { width: 100%; margin-top: 5px; }
    </style>
</head>
<body onmousemove="handleMouseMove(event)">

    <div class="main-wrapper">
        <div id="videoSection">
            <video id="vPlayer" loop muted autoplay src="promo.mp4"></video>
        </div>

        <div id="numberSection">
            <div class="current-call">
                <img src="logo.png" id="logoDisplay" class="uni-logo">
                <div style="font-size: 16px; color: var(--gold); letter-spacing: 1px;">STUDENT NUMBER</div>
                <div id="numDisplay">--</div>
                <div id="winDisplay">WELCOME</div>
            </div>
            <div id="historyBox">
                <div style="color:var(--gold); font-size:12px; font-weight:bold; margin-bottom:10px; border-bottom:1px solid #334155;">RECENT CALLS</div>
                <div id="historyItems"></div>
            </div>
        </div>
    </div>

    <div class="ticker-container">
        <div class="ticker-title">INFO</div>
        <div class="ticker-wrap"><div id="tickerText" class="ticker-content">Queue System Active. Welcome to the Student Portal.</div></div>
    </div>

    <div class="admin-sidebar" id="sidebar">
        <div style="text-align:center; font-size:12px; color:var(--gold); font-weight:bold; margin-bottom:5px;">DISPLAY SETTINGS</div>
        
        <div class="control-group">
            <label>1. LOGO POSITION (↑ ↓ ← →)</label>
            <div class="btn-row">
                <button onclick="moveLogo('top', -2)">↑</button>
                <button onclick="moveLogo('top', 2)">↓</button>
                <button onclick="moveLogo('left', -2)">←</button>
                <button onclick="moveLogo('left', 2)">→</button>
            </div>
        </div>

        <div class="control-group">
            <label>2. SIZES (LOGO & MAIN FONT)</label>
            <div class="btn-row">
                <button onclick="resizeLogo(15)">LOGO +</button>
                <button onclick="resizeLogo(-15)">LOGO -</button>
                <button onclick="resizeFont(20)">FONT +</button>
                <button onclick="resizeFont(-20)">FONT -</button>
            </div>
        </div>

        <div class="control-group">
            <label>3. SCREEN LAYOUT (VIDEO SIZE)</label>
            <input type="range" min="0.5" max="3" step="0.1" value="1.4" oninput="resizeLayout(this.value)">
        </div>

        <div class="control-group">
            <label>4. TICKER ANNOUNCEMENT</label>
            <input type="text" id="tIn" placeholder="Type message...">
            <button onclick="setTicker()" style="width:100%; margin-top:5px; background:var(--primary)">APPLY MSG</button>
        </div>

        <div class="control-group">
            <label>5. TICKER SPEED</label>
            <input type="range" min="5" max="60" value="20" oninput="setSpeed(this.value)">
        </div>

        <button onclick="goFull()" style="background:#0f172a">🖥 FULLSCREEN MODE</button>
        <center style="font-size: 8px; color: #666; margin-top: 5px;">Move mouse to top-right corner to show this panel</center>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCJ_xQhr4l9K8pnHSUpYcXqYJ4fPcnTG_I",
        authDomain: "qsystem-e7b9f.firebaseapp.com",
        databaseURL: "https://qsystem-e7b9f-default-rtdb.firebaseio.com",
        projectId: "qsystem-e7b9f",
        storageBucket: "qsystem-e7b9f.firebasestorage.app",
        messagingSenderId: "40621146758",
        appId: "1:40621146758:web:898aae4ae113567d958707",
        measurementId: "G-EPJFRRCZ6K"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lTop = 10; let lLeft = 50; let lWidth = 150; let fSize = 180;
    let initialX = 0; let initialY = 0;

    window.goFull = function() {
        const sidebar = document.getElementById('sidebar');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().then(() => {
                sidebar.classList.add('blocked');
                initialX = event.clientX;
                initialY = event.clientY;
            });
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    };

    window.handleMouseMove = function(e) {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('blocked')) {
            let diffX = Math.abs(e.clientX - initialX);
            let diffY = Math.abs(e.clientY - initialY);
            if (diffX > 50 || diffY > 50) {
                sidebar.classList.remove('blocked');
            }
        }
    };

    window.moveLogo = function(dir, val) {
        const logo = document.getElementById('logoDisplay');
        if(dir === 'top') { lTop += val; logo.style.top = lTop + "%"; }
        if(dir === 'left') { lLeft += val; logo.style.left = lLeft + "%"; }
    };

    window.resizeLogo = function(val) {
        lWidth += val;
        document.getElementById('logoDisplay').style.width = lWidth + "px";
    };

    window.resizeFont = function(val) {
        fSize += val;
        document.getElementById('numDisplay').style.fontSize = fSize + "px";
    };

    window.resizeLayout = function(val) {
        document.getElementById('videoSection').style.flex = val;
    };

    window.setTicker = function() {
        const txt = document.getElementById('tIn').value;
        if(txt) document.getElementById('tickerText').textContent = txt;
    };

    window.setSpeed = function(val) {
        document.getElementById('tickerText').style.animationDuration = val + "s";
    };

    db.ref('currentCall').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('numDisplay').textContent = data.number;
            document.getElementById('winDisplay').textContent = "WINDOW " + data.window;
            
            const hItems = document.getElementById('historyItems');
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span>Student ${data.number}</span> <span style="color:var(--gold)">W-${data.window}</span>`;
            hItems.insertBefore(div, hItems.firstChild);
            if(hItems.children.length > 6) hItems.lastChild.remove();

            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(`Student number ${data.number}, go to window ${data.window}`);
            m.rate = 0.85; window.speechSynthesis.speak(m);
        }
    });
</script>
</body>
</html>
